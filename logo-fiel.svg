<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAzul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- TORRE DE CONTROL (izquierda) -->
  <g id="tower">
    <!-- Base rectangular -->
    <rect x="30" y="40" width="20" height="50" fill="url(#gradAzul)" rx="3" stroke="url(#gradCyan)" stroke-width="1"/>
    <!-- Cabina superior (esfera) -->
    <circle cx="40" cy="35" r="12" fill="url(#gradCyan)" stroke="url(#gradAzul)" stroke-width="1.5"/>
    <!-- Luz roja en la cabina -->
    <circle cx="40" cy="35" r="4" fill="#ffd700" opacity="0.9"/>
  </g>

  <!-- AVIÓN (arriba, en vuelo) -->
  <g id="airplane" transform="translate(90, 50) rotate(-15)">
    <!-- Fuselaje principal (plateado-azul) -->
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="url(#gradCyan)" stroke="url(#gradAzul)" stroke-width="1"/>
    
    <!-- Cabina (ventanilla) -->
    <circle cx="-8" cy="-2" r="6" fill="url(#gradAzul)" stroke="#ffd700" stroke-width="1"/>
    <circle cx="-8" cy="-2" r="3" fill="#ffd700" opacity="0.8"/>
    
    <!-- Alas largas (diseño elegante) -->
    <ellipse cx="0" cy="2" rx="45" ry="7" fill="url(#gradCyan)" opacity="0.9" stroke="url(#gradAzul)" stroke-width="0.5"/>
    
    <!-- Alerones en puntas de alas -->
    <path d="M -45 2 Q -50 0 -48 5" fill="url(#gradAzul)" stroke="url(#gradCyan)" stroke-width="0.5"/>
    <path d="M 45 2 Q 50 0 48 5" fill="url(#gradAzul)" stroke="url(#gradCyan)" stroke-width="0.5"/>
    
    <!-- Estabilizador vertical (cola) -->
    <polygon points="32,-2 42,-8 42,8" fill="url(#gradAzul)" stroke="url(#gradCyan)" stroke-width="0.5"/>
    
    <!-- Tren de aterrizaje -->
    <line x1="-8" y1="10" x2="-8" y2="16" stroke="url(#gradAzul)" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="10" x2="8" y2="16" stroke="url(#gradAzul)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-8" cy="16" r="2.5" fill="#333" opacity="0.7"/>
    <circle cx="8" cy="16" r="2.5" fill="#333" opacity="0.7"/>
  </g>

  <!-- PISTA DE ATERRIZAJE (abajo) -->
  <g id="runway">
    <!-- Pista principal (azul) -->
    <rect x="25" y="130" width="130" height="18" fill="url(#gradAzul)" rx="9" stroke="url(#gradCyan)" stroke-width="1" opacity="0.95"/>
    
    <!-- Líneas centrales blancas/doradas de la pista -->
    <rect x="30" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    <rect x="52" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    <rect x="74" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    <rect x="96" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    <rect x="118" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    <rect x="140" y="140" width="4" height="8" fill="#ffd700" opacity="0.8" rx="1"/>
    
    <!-- Borde lateral de pista -->
    <line x1="25" y1="130" x2="155" y2="130" stroke="url(#gradCyan)" stroke-width="1" opacity="0.6"/>
    <line x1="25" y1="148" x2="155" y2="148" stroke="url(#gradCyan)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Círculo decorativo de fondo sutil -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="url(#gradCyan)" stroke-width="0.5" opacity="0.15"/>
</svg>
