<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular sutil -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.1"/>
  
  <!-- Torre de control: diseño redondeado -->
  <g id="tower">
    <!-- Base de la torre -->
    <rect x="54" y="15" width="12" height="35" rx="6" fill="url(#grad1)"/>
    <!-- Esfera superior -->
    <circle cx="60" cy="12" r="5" fill="url(#grad2)"/>
    <!-- Luz de la torre -->
    <circle cx="60" cy="12" r="2" fill="#ffd700" opacity="0.8"/>
  </g>
  
  <!-- Pista de aterrizaje -->
  <g id="runway">
    <rect x="20" y="75" width="80" height="8" rx="4" fill="url(#grad1)" opacity="0.9"/>
    <!-- Marcas de la pista -->
    <rect x="28" y="76" width="3" height="6" fill="#ffd700" opacity="0.7"/>
    <rect x="45" y="76" width="3" height="6" fill="#ffd700" opacity="0.7"/>
    <rect x="60" y="76" width="3" height="6" fill="#ffd700" opacity="0.7"/>
    <rect x="75" y="76" width="3" height="6" fill="#ffd700" opacity="0.7"/>
    <rect x="92" y="76" width="3" height="6" fill="#ffd700" opacity="0.7"/>
  </g>
  
  <!-- Avión: diseño suave y moderno -->
  <g id="airplane">
    <!-- Fuselaje principal -->
    <ellipse cx="60" cy="48" rx="18" ry="8" fill="url(#grad2)"/>
    <!-- Cabina -->
    <circle cx="60" cy="46" r="4" fill="url(#grad1)"/>
    <!-- Ventanilla -->
    <circle cx="60" cy="46" r="2" fill="#ffd700" opacity="0.6"/>
    
    <!-- Alas largas y redondeadas -->
    <ellipse cx="60" cy="50" rx="32" ry="5" fill="url(#grad2)" opacity="0.85"/>
    
    <!-- Alerones de las alas (puntitas) -->
    <path d="M 28 50 Q 25 48 24 50 Q 25 52 28 50" fill="url(#grad1)"/>
    <path d="M 92 50 Q 95 48 96 50 Q 95 52 92 50" fill="url(#grad1)"/>
    
    <!-- Cola (estabilizador vertical) -->
    <path d="M 78 48 L 88 45 L 88 51 Z" fill="url(#grad1)"/>
    
    <!-- Ruedas del tren de aterrizaje -->
    <circle cx="55" cy="56" r="2.5" fill="#333" opacity="0.6"/>
    <circle cx="65" cy="56" r="2.5" fill="#333" opacity="0.6"/>
  </g>
  
  <!-- Línea decorativa de horizonte -->
  <line x1="15" y1="65" x2="105" y2="65" stroke="url(#grad2)" stroke-width="0.5" opacity="0.3"/>
</svg>
